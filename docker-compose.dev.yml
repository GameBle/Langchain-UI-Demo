# Development stack: bind-mount source + dev servers — edit code without rebuilding images.
#
#   docker compose -f docker-compose.dev.yml up
#
# Open http://localhost:13000 (Vite). Backend API: http://localhost:13001
# First start runs npm ci in each container (one-time cost); then hot reload on save.
#
# Named volumes keep node_modules inside Linux containers (avoids Windows↔Linux binary issues).

services:
  backend:
    build: ./backend
    ports:
      - "13001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"
    environment:
      - PORT=3001

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "13000:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://backend:3001
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
