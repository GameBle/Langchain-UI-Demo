# Host ports use 13000/13001 because Windows often reserves 3000–3001 for Hyper-V/WSL
# (Docker then fails with "bind: ... forbidden"). Change these if they conflict locally.
services:
  backend:
    build: ./backend
    ports:
      - "13001:3001"
    environment:
      - PORT=3001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "13000:80"
    depends_on:
      - backend
